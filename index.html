<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeySur - Coming Soon</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f4f1;
            color: #1a202c;
            text-align: center;
            display: grid;
            place-items: center;
            min-height: 100vh;
            line-height: 1.6;
            font-feature-settings: 'kern' 1, 'liga' 1;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 680px;
            padding: 3rem 2rem;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-img {
            height: 100px;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .coming-soon {
            font-size: clamp(1.4rem, 3vw, 2rem);
            margin-top: 3rem;
            margin-bottom: 2.5rem;
            color: #2d3748;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }

        .coming-soon::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #1AC47C, #097742);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
            }

            .logo-img {
                height: 80px;
            }

            .coming-soon {
                margin-top: 2rem;
                margin-bottom: 2rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .container {
                animation: none;
            }

            .logo-img {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="image/veysur-logo-light.svg" alt="VeySur Logo" class="logo-img">
        <div class="coming-soon">Coming soon...</div>
    </div>
</body>
</html>
